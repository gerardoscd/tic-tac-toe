<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Web - by jerryscd</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .contenedor {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Pantalla de Registro */
        .grupo-input {
            margin-bottom: 15px;
            text-align: left;
        }
        .grupo-input label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .grupo-input input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #1a252f;
        }

        /* Tablero de Juego */
        .oculto { display: none; }
        
        #marcador {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333333;
        }
        
        #etiqueta-turno {
            font-size: 16px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .tablero {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 5px;
            justify-content: center;
        }
        .celda {
            width: 100px;
            height: 100px;
            background-color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            user-select: none;
        }
        .celda:hover {
            background-color: #bdc3c7;
        }
        
        /* Colores dinámicos */
        .texto-azul { color: blue; }
        .texto-rojo { color: red; }
        .texto-verde { color: #27ae60; }
        .texto-naranja { color: #e67
